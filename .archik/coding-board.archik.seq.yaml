version: "1.0"
name: Watch progress — coding board
description: >-
  The coding board's React UI streams the lab's state: it asks the board server for the task
  state, which reads the worktrees, results, and playbook, and renders the loop + timeline.
realizes:
  useCase: watch-progress
  slice: coding-board
participants:
  - id: ui
    nodeId: coding-board-ui
  - id: board
    nodeId: coding-board
  - id: pb
    nodeId: playbook
steps:
  - type: note
    id: n-start
    position: over
    participants: [ui]
    text: "Operator opens `leanlab board` in the browser."
  - type: message
    id: m-state
    from: ui
    to: board
    label: "GET /api/state (SSE)"
    arrow: sync
    activate: true
  - type: message
    id: m-read
    from: board
    to: pb
    label: "read worktrees + results + playbook"
    arrow: sync
  - type: message
    id: m-read-ret
    from: pb
    to: board
    label: "tasks + playbook text"
    arrow: return
  - type: message
    id: m-render
    from: board
    to: ui
    label: "state → render loop, table, timeline, chat"
    arrow: return
