version: "1.0"
id: spec-task
name: Spec a coding task
status: active
primaryActor: operator
secondaryActors:
  - claude
goal: >-
  The operator turns a coding task into a clear spec and a set of acceptance tests,
  approved and then locked, so the engineer is judged against criteria it cannot change.
preconditions:
  - The coding lab points at a git repository.
postconditions:
  - "An isolated worktree holds the approved spec and the locked (read-only) acceptance tests for the task."
flows:
  basic:
    steps:
      - "Operator gives a coding task for the lab's target repository."
      - "The spec-writer studies the project and drafts a spec plus acceptance tests for the task."
      - "The spec-writer creates an isolated git worktree and writes the spec and tests into it."
      - "The spec-writer shows the spec and tests; the operator approves them."
      - "The spec-writer locks the acceptance tests read-only as the frozen criteria for this task."
  alternates:
    - id: spec-feedback
      branchFrom: basic.4
      steps:
        - "The operator rejects the draft and gives feedback instead of approving."
        - "The spec-writer revises the spec and tests with that feedback."
        - "The loop returns to basic step 4 until the operator approves."
slices:
  - id: draft-and-lock-acceptance
    description: The spec-writer drafts a spec + acceptance tests, the operator approves, and the tests are locked in an isolated worktree.
    flows: [basic, spec-feedback]
    tests: [tests/test_coding_spec.py]
    status: active
    realization:
      seqFile: .archik/spec-task.archik.seq.yaml
