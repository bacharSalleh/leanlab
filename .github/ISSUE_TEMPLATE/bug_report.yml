name: Bug report
description: Something isn't working
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands you ran (e.g. `leanlab build <slug> --reviewers 3`).
      placeholder: |
        1. leanlab init ...
        2. leanlab spec "..."
        3. leanlab build ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: leanlab version
      description: Output of `leanlab --version`.
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS + Python version (e.g. macOS 15, Python 3.12).
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      render: shell
