name: Publish to PyPI

# Pushing a tag like v0.2.2 triggers this. It builds the board UI, builds the
# sdist + wheel, publishes to PyPI via Trusted Publishing (OIDC — no token
# stored anywhere), and cuts a GitHub Release. The tag must match the version
# in pyproject.toml.
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi          # configure this environment as the trusted publisher on PyPI
    permissions:
      contents: write          # the GitHub Release step needs to create the release
      id-token: write          # OIDC: PyPI Trusted Publishing mints a short-lived token
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # The wheel must ship the compiled React board (board_dist/), so build it first.
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build board UI
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build sdist + wheel
        run: uv build

      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          [ "$tag" = "$ver" ] || { echo "tag v$tag != pyproject version $ver"; exit 1; }

      # Trusted Publishing — no API token. Configure a pending publisher on PyPI
      # first (see .github/RELEASING.md).
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Extract changelog section
        id: changelog
        run: |
          tag="${GITHUB_REF_NAME#v}"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$tag" '
              $0 ~ "^## \\["ver"\\]" { capture = 1; next }
              capture && /^## \[/ { exit }
              capture { print }
            ' CHANGELOG.md > /tmp/release-notes.md
          fi
          if [ ! -s /tmp/release-notes.md ]; then
            echo "_See the [CHANGELOG](./CHANGELOG.md) for full release notes._" > /tmp/release-notes.md
          fi
          echo "path=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.path }}
          generate_release_notes: true
          make_latest: true
