name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Ruff
        run: uvx ruff check leanlab tests

  test:
    name: Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true

      - name: Sync deps
        run: uv sync --group dev

      - name: Test
        run: uv run pytest -q

  build:
    name: Build (wheel + UI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build board UI
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist + wheel
        run: uv build

      - name: Check the wheel ships the built UI
        run: |
          python -m zipfile -l dist/*.whl | grep -q "board_dist/index.html" \
            && echo "✓ board_dist bundled in the wheel" \
            || (echo "✗ board_dist missing from the wheel" && exit 1)

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
